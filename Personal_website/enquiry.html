<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enquiry | Kaviya B</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="preload">
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-ring"></div>
    </div>

    <!-- Fixed Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-brand fw-bold" href="index.html">
          <i class="bi bi-person-circle"></i>
          <span>Kaviya B</span>
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <i class="bi bi-chevron-double-left"></i>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="index.html"><i class="bi bi-house-door-fill"></i><span>Home</span></a>
        <a class="sidebar-link" href="education.html"><i class="bi bi-journal-bookmark-fill"></i><span>Education</span></a>
        <a class="sidebar-link" href="hobbies.html"><i class="bi bi-heart-pulse-fill"></i><span>Hobbies</span></a>
        <a class="sidebar-link" href="contact.html"><i class="bi bi-telephone-fill"></i><span>Contact</span></a>
        <a class="sidebar-link" href="enquiry.html"><i class="bi bi-envelope-fill"></i><span>Enquiry</span></a>
      </nav>
    </aside>

    <!-- Enquiry Header -->
    <section class="page-header py-4">
      <div class="container py-4 text-center">
        <h1 class="display-5 fw-bold mb-3">Enquiry Form</h1>
        <p class="lead text-muted">Send your message and I’ll get back to you soon.</p>
      </div>
    </section>

    <!-- Enquiry Form -->
    <section class="py-5 bg-light">
      <div class="container py-4">
        <div class="row justify-content-center">
          <div class="col-lg-8 reveal">
            <div class="card shadow-sm border-0 p-4">
              <form id="enquiryForm" novalidate>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" />
                  </div>
                  <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" />
                  </div>
                  <div class="col-md-6">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" />
                  </div>
                  <div class="col-md-6">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" class="form-control" id="subject" placeholder="Enter subject" />
                  </div>
                  <div class="col-12">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="5" placeholder="Write your message here"></textarea>
                  </div>
                </div>

                <div id="formMessage" class="alert mt-4 d-none" role="alert"></div>

                <div class="d-flex gap-3 mt-4">
                  <button type="submit" class="btn btn-primary">Submit</button>
                  <button type="reset" class="btn btn-outline-primary">Reset</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
      <div class="container text-center">
        <p class="mb-0">© <span id="year"></span> Kaviya B. All rights reserved.</p>
      </div>
    </footer>

    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top">
      <i class="bi bi-arrow-up"></i>
    </button>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="js/script.js"></script>
  </body>
</html>
